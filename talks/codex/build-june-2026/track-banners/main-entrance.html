<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Build Entrance</title>
  <style>
    @page {
      size: A3 portrait;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --codex-fg: #ffffff;
      --codex-ink: #07101f;
      --codex-accent: #3442e0;
      --codex-accent-2: #6e7bff;
      --codex-deep: #111b3f;
    }

    html,
    body {
      margin: 0;
      width: 297mm;
      height: 420mm;
      min-height: 420mm;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.62), transparent 23%),
        radial-gradient(circle at 78% 62%, rgba(126, 224, 255, 0.22), transparent 28%),
        linear-gradient(145deg, var(--codex-accent-2), var(--codex-accent) 54%, var(--codex-deep));
      color: var(--codex-fg);
      font-family: "Helvetica Neue", Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      display: block;
    }

    .flyer {
      position: relative;
      width: 297mm;
      height: 420mm;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.62), transparent 23%),
        radial-gradient(circle at 78% 62%, rgba(126, 224, 255, 0.22), transparent 28%),
        linear-gradient(145deg, var(--codex-accent-2), var(--codex-accent) 54%, var(--codex-deep));
      isolation: isolate;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .flyer::before {
      content: "<";
      position: absolute;
      left: -21mm;
      bottom: 43mm;
      color: rgba(255, 255, 255, 0.12);
      font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      font-size: 210mm;
      line-height: 1;
      font-weight: 800;
      transform: scaleX(1.08);
      z-index: 0;
    }

    .flyer::after {
      content: "BUILD";
      position: absolute;
      left: -10mm;
      bottom: -18mm;
      color: rgba(255, 255, 255, 0.08);
      font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      font-size: 64mm;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.1em;
      z-index: 0;
    }

    .topline,
    .hero,
    .cue,
    .footer {
      position: absolute;
      z-index: 2;
    }

    .topline {
      inset: 23mm 24mm auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-size: 8.6mm;
      line-height: 1;
      font-weight: 750;
      letter-spacing: -0.045em;
    }

    .date-chip {
      display: inline-flex;
      align-items: center;
      gap: 4mm;
      color: #ffffff;
      font-size: 5.4mm;
      line-height: 1;
      font-weight: 750;
    }

    .date-chip span {
      display: grid;
      place-items: center;
      width: 13mm;
      height: 13mm;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 0.4mm solid rgba(255, 255, 255, 0.3);
      font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      font-size: 5.6mm;
      font-weight: 850;
    }

    .hero {
      top: 88mm;
      left: 24mm;
      right: 24mm;
    }

    .eyebrow {
      margin: 0 0 11mm;
      color: rgba(255, 255, 255, 0.76);
      font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      font-size: 6mm;
      font-weight: 850;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: #ffffff;
      font-size: 46mm;
      line-height: 0.91;
      font-weight: 680;
      letter-spacing: -0.058em;
    }

    .inside {
      display: block;
      margin-top: 7mm;
      color: rgba(255, 255, 255, 0.78);
      font-size: 37mm;
      line-height: 0.94;
      font-weight: 680;
      letter-spacing: -0.045em;
    }

    .cue {
      left: 24mm;
      right: 24mm;
      top: 268mm;
      display: grid;
      grid-template-columns: 30mm 1fr 30mm;
      align-items: center;
      min-height: 44mm;
      padding: 0 7mm;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--codex-accent);
      box-shadow: 0 8mm 28mm rgba(7, 16, 31, 0.18);
      font-size: 17mm;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.045em;
    }

    .cue > span:not(.cue-icon) {
      grid-column: 2;
      justify-self: center;
    }

    .cue-icon {
      display: grid;
      place-items: center;
      grid-column: 1;
      width: 30mm;
      height: 30mm;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--codex-accent-2), var(--codex-accent));
      color: #ffffff;
      font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      font-size: 18mm;
      line-height: 1;
      font-weight: 900;
    }

    .footer {
      left: 24mm;
      right: 24mm;
      bottom: 22mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.78);
      font-size: 5.4mm;
      line-height: 1;
      font-weight: 650;
    }

    @media print {
      html,
      body,
      .flyer {
        width: 297mm;
        height: 420mm;
      }
    }
  </style>
</head>
<body>
  <section class="flyer" aria-label="Codex Build entrance flyer">
    <header class="topline">
      <div class="wordmark">Codex Community</div>
      <div class="date-chip"><span>&lt;</span> June 20</div>
    </header>

    <main class="hero">
      <p class="eyebrow">Codex Build Vienna</p>
      <h1>Codex Build <span class="inside">inside</span></h1>
    </main>

    <div class="cue">
      <span class="cue-icon">&lt;</span>
      <span>Come in</span>
    </div>

    <footer class="footer">
      <span>Codex Community Build</span>
      <span>June 20, 2026</span>
    </footer>
  </section>
</body>
</html>
